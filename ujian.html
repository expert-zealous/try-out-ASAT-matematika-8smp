<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Try Out Expert Zealous</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial;
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    margin:0;
    padding:0;

}

/* HEADER */

.header{

    background:linear-gradient(135deg,#0f172a,#1e293b);
    padding:16px 18px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    position:sticky;
    top:0;
    z-index:999;

    box-shadow:0 4px 15px rgba(0,0,0,0.25);

    border-radius:0 0 22px 22px;

}

.header-kiri{

    display:flex;
    align-items:center;
    gap:14px;

}

.logo-header{

    width:95px;
    object-fit:contain;

}

.judul-header{

    display:flex;
    flex-direction:column;

}

.judul-besar{

    color:#ffd700;
    font-size:26px;
    font-weight:bold;
    font-style:italic;
    line-height:1.1;

}

.judul-kecil{

    color:white;
    font-size:14px;
    opacity:0.9;
    margin-top:3px;

}

.timer{

    font-size:34px;
    font-weight:bold;
    color:#ffd700;
    font-style:italic;

}

/* CONTAINER */

.container{

    display:flex;
    flex-wrap:wrap;
    gap:18px;

    padding:18px;

}

/* SOAL */

.main{

    flex:3;
    min-width:300px;

    background:white;

    padding:22px;

    border-radius:22px;

    box-shadow:0 4px 14px rgba(0,0,0,0.08);

}

#nomorSoal{

    margin-bottom:18px;
    color:#0f172a;

}

#gambarSoal{

    width:100%;
    border-radius:18px;

}

/* PILIHAN */

.pilihan button{

    width:100%;

    padding:16px;

    margin-top:14px;

    border:none;

    border-radius:16px;

    background:#2196f3;

    color:white;

    font-size:18px;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

    text-align:left;

}

.pilihan button:hover{

    transform:scale(1.02);

}

.pilihan button.selected{

    background:linear-gradient(135deg,#16a34a,#22c55e);

}

/* SIDEBAR */

.sidebar{

    flex:1;
    min-width:250px;

    background:white;

    padding:22px;

    border-radius:22px;

    box-shadow:0 4px 14px rgba(0,0,0,0.08);

    height:fit-content;

}

.info{

    margin-bottom:18px;
    line-height:1.8;

}

/* NAVIGASI */

.nav-soal{

    display:grid;
    grid-template-columns:repeat(5,1fr);

    gap:10px;

    margin-top:16px;

}

.nav-soal button{

    padding:12px;

    border:none;

    border-radius:14px;

    background:#cbd5e1;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

}

.nav-soal button.active{

    background:gold;
    color:black;

    transform:scale(1.08);

}

.nav-soal button.answered{

    background:#22c55e;
    color:white;

}

#selesaiBtn{

    width:100%;

    margin-top:22px;

    padding:16px;

    border:none;

    border-radius:16px;

    background:linear-gradient(135deg,#dc2626,#ef4444);

    color:white;

    font-size:18px;
    font-weight:bold;

    cursor:pointer;

}

/* RESPONSIVE */

@media(max-width:700px){

    .header{

        flex-direction:column;
        gap:12px;

        text-align:center;

    }

    .header-kiri{

        flex-direction:column;

    }

    .logo-header{

        width:85px;

    }

    .judul-besar{

        font-size:22px;

    }

    .timer{

        font-size:28px;

    }

}
    
</style>
</head>
<body>
<div class="header">

    <div class="header-kiri">

        <img class="logo-header"
        src="https://drive.google.com/thumbnail?sz=w1000&id=1r6OAqG_IeaIbkVEbi-DMJVYEy5s0-mRW">

        <div class="judul-header">

            <div class="judul-besar">
                Jagonya Matematika
            </div>

            <div class="judul-kecil">
                Les Private Matematika
            </div>

        </div>

    </div>

    <div class="timer" id="timer">
        90:00
    </div>

</div>
    
<div class="header">

<div class="logo-area">

<img src="https://drive.google.com/thumbnail?sz=w1000&id=1r6OAqG_IeaIbkVEbi-DMJVYEy5s0-mRW">

<div>
<h2>Jagonya Matematika</h2>
<p>Les Private Matematika</p>
<p>CP:P.Nur_085850674833</p>    
</div>

</div>

</div>

<div class="container">

<div class="main">

<h2 id="nomorSoal"></h2>

<img id="gambarSoal" src="">

<div class="pilihan">

<button onclick="jawab('A')" id="btnA"></button>
<button onclick="jawab('B')" id="btnB"></button>
<button onclick="jawab('C')" id="btnC"></button>
<button onclick="jawab('D')" id="btnD"></button>

</div>

</div>

<div class="sidebar">

<div id="timer">90:00</div>

<div class="info">
<b>Peserta:</b><br>
<span id="namaPeserta"></span>
</div>

<h3>Navigasi Soal</h3>

<div class="nav-soal" id="navSoal"></div>

<button id="selesaiBtn" onclick="selesaiUjian()">
Selesai Ujian
</button>

</div>

</div>

<script>

const csvSoal = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQBwCh8bWn1_YXtW4ITfOz6qSRI_x5wTO8_JIuL9v5ibeiEdPQP0vEwG_dPJnM1UutBVZjRaDI8DSVN/pub?gid=0&single=true&output=csv";

let soal = [];
let indexSoal = 0;
let skor = 0;

let jawabanPeserta = [];

document.getElementById("namaPeserta").innerHTML =
localStorage.getItem("namaPeserta") +
" (" +
localStorage.getItem("nomorPeserta") +
")";

async function loadSoal(){

    const response = await fetch(csvSoal);

    const data = await response.text();

    const rows = data.split("\n").slice(1);

    soal = rows.map(row => {

        const cols = row.split(",");

        return {
            nomor: cols[0],
            gambar: cols[1],
            A: cols[2],
            B: cols[3],
            C: cols[4],
            D: cols[5],
            jawaban: cols[6]?.trim()
        };

    });

    buatNavigasi();

    tampilSoal();

}

function tampilSoal(){

    const s = soal[indexSoal];

    document.getElementById("nomorSoal").innerHTML =
    "Soal Nomor " + s.nomor;

    document.getElementById("gambarSoal").src =
    s.gambar;

    document.getElementById("btnA").innerHTML =
    "A. " + s.A;

    document.getElementById("btnB").innerHTML =
    "B. " + s.B;

    document.getElementById("btnC").innerHTML =
    "C. " + s.C;

    document.getElementById("btnD").innerHTML =
    "D. " + s.D;

    // RESET WARNA SEMUA PILIHAN
    document.getElementById("btnA").classList.remove("selected");
    document.getElementById("btnB").classList.remove("selected");
    document.getElementById("btnC").classList.remove("selected");
    document.getElementById("btnD").classList.remove("selected");

    // TAMPILKAN JAWABAN YANG SUDAH DIPILIH
    const jawaban = jawabanPeserta[indexSoal];

    if(jawaban){

        document.getElementById("btn"+jawaban)
        .classList.add("selected");

    }

    updateNavigasiAktif();

}
    
function jawab(pilih){

    jawabanPeserta[indexSoal] = pilih;

    document.getElementById("btnA").classList.remove("selected");
    document.getElementById("btnB").classList.remove("selected");
    document.getElementById("btnC").classList.remove("selected");
    document.getElementById("btnD").classList.remove("selected");

    document.getElementById("btn"+pilih)
    .classList.add("selected");

    updateNavigasi();

}
    
function buatNavigasi(){

    const nav = document.getElementById("navSoal");

    for(let i=0;i<soal.length;i++){

        nav.innerHTML += `
            <button id="nav${i}"
            onclick="bukaSoal(${i})">
            ${i+1}
            </button>
        `;

    }

}

function bukaSoal(i){

    indexSoal = i;

    tampilSoal();

}

function updateNavigasi(){

    for(let i=0;i<jawabanPeserta.length;i++){

        if(jawabanPeserta[i]){

            document.getElementById("nav"+i)
            .classList.add("answered");

        }

    }

}

function updateNavigasiAktif(){

    for(let i=0;i<soal.length;i++){

        document.getElementById("nav"+i)
        .classList.remove("active");

    }

    document.getElementById("nav"+indexSoal)
    .classList.add("active");

}
    
function selesaiUjian(){

    skor = 0;

    for(let i=0;i<soal.length;i++){

        if(jawabanPeserta[i] === soal[i].jawaban){

            skor += 10;

        }

    }

    document.body.innerHTML = `
        <div style="
        padding:40px;
        text-align:center;
        font-family:Arial">

        <h1>UJIAN SELESAI</h1>

        <h2>Nilai Anda : ${skor}</h2>

        </div>
    `;

}

let waktu = 90 * 60;

function updateTimer(){

    let menit = Math.floor(waktu / 60);
    let detik = waktu % 60;

    menit = menit < 10 ? "0"+menit : menit;
    detik = detik < 10 ? "0"+detik : detik;

    document.getElementById("timer").innerHTML =
    menit + ":" + detik;

    if(waktu <= 0){

        selesaiUjian();

    }

    waktu--;

}

setInterval(updateTimer,1000);

loadSoal();

</script>

</body>
</html>
