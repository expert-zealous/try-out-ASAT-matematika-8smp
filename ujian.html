<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CBT Expert Zealous</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    background:#f0f2f5;
}

.header{
    background:#1e88e5;
    color:white;
    padding:15px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo-area{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo-area img{
    width:90px;
    height:auto;
    object-fit:contain;
}    
    
.container{
    display:flex;
    flex-wrap:wrap;
    padding:20px;
    gap:20px;
}

.main{
    flex:3;
    min-width:300px;
    background:white;
    padding:20px;
    border-radius:10px;
}

.sidebar{
    flex:1;
    min-width:250px;
    background:white;
    padding:20px;
    border-radius:10px;
    height:fit-content;
}

#timer{
    font-size:28px;
    color:red;
    font-weight:bold;
    text-align:center;
    margin-bottom:20px;
}

#gambarSoal{
    width:100%;
    margin-top:20px;
    border-radius:10px;
}

.pilihan button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    background:#2196f3;
    color:white;
    cursor:pointer;
    border-radius:8px;
    font-size:16px;
    text-align:left;
}

.pilihan button:hover{
    background:#1976d2;
}
    
.pilihan button.selected{
    background:green;
}
    
.nav-soal{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    margin-top:20px;
}

.nav-soal button{
    padding:10px;
    border:none;
    background:#ddd;
    cursor:pointer;
    border-radius:5px;
    font-weight:bold;
}

.nav-soal button.answered{
    background:green;
    color:white;
}
    
.nav-soal button.active{
    border:3px solid gold;
    transform:scale(1.1);
}
    
#selesaiBtn{
    width:100%;
    margin-top:20px;
    padding:14px;
    background:red;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.info{
    margin-bottom:15px;
    line-height:1.8;
}

</style>
</head>
<body>

<div class="header">

<div class="logo-area">

<img src="https://drive.google.com/thumbnail?sz=w1000&id=1eOURv9E9HRTqPU9alLUp4ILvgfJbavN8">

<div>
<h2>Expert Zealous CBT</h2>
<p>Ujian Matematika SMP</p>
</div>

</div>

</div>

<div class="container">

<div class="main">

<h2 id="nomorSoal"></h2>

<img id="gambarSoal" src="">

<div class="pilihan">

<button onclick="jawab('A')" id="btnA"></button>
<button onclick="jawab('B')" id="btnB"></button>
<button onclick="jawab('C')" id="btnC"></button>
<button onclick="jawab('D')" id="btnD"></button>

</div>

</div>

<div class="sidebar">

<div id="timer">90:00</div>

<div class="info">
<b>Peserta:</b><br>
<span id="namaPeserta"></span>
</div>

<h3>Navigasi Soal</h3>

<div class="nav-soal" id="navSoal"></div>

<button id="selesaiBtn" onclick="selesaiUjian()">
Selesai Ujian
</button>

</div>

</div>

<script>

const csvSoal = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQBwCh8bWn1_YXtW4ITfOz6qSRI_x5wTO8_JIuL9v5ibeiEdPQP0vEwG_dPJnM1UutBVZjRaDI8DSVN/pub?gid=0&single=true&output=csv";

let soal = [];
let indexSoal = 0;
let skor = 0;

let jawabanPeserta = [];

document.getElementById("namaPeserta").innerHTML =
localStorage.getItem("namaPeserta") +
" (" +
localStorage.getItem("nomorPeserta") +
")";

async function loadSoal(){

    const response = await fetch(csvSoal);

    const data = await response.text();

    const rows = data.split("\n").slice(1);

    soal = rows.map(row => {

        const cols = row.split(",");

        return {
            nomor: cols[0],
            gambar: cols[1],
            A: cols[2],
            B: cols[3],
            C: cols[4],
            D: cols[5],
            jawaban: cols[6]?.trim()
        };

    });

    buatNavigasi();

    tampilSoal();

}

function tampilSoal(){

    const s = soal[indexSoal];

    document.getElementById("nomorSoal").innerHTML =
    "Soal Nomor " + s.nomor;

    document.getElementById("gambarSoal").src =
    s.gambar;

    document.getElementById("btnA").innerHTML =
    "A. " + s.A;

    document.getElementById("btnB").innerHTML =
    "B. " + s.B;

    document.getElementById("btnC").innerHTML =
    "C. " + s.C;

    document.getElementById("btnD").innerHTML =
    "D. " + s.D;

    // RESET WARNA SEMUA PILIHAN
    document.getElementById("btnA").classList.remove("selected");
    document.getElementById("btnB").classList.remove("selected");
    document.getElementById("btnC").classList.remove("selected");
    document.getElementById("btnD").classList.remove("selected");

    // TAMPILKAN JAWABAN YANG SUDAH DIPILIH
    const jawaban = jawabanPeserta[indexSoal];

    if(jawaban){

        document.getElementById("btn"+jawaban)
        .classList.add("selected");

    }

    updateNavigasiAktif();

}
    
function jawab(pilih){

    jawabanPeserta[indexSoal] = pilih;

    document.getElementById("btnA").classList.remove("selected");
    document.getElementById("btnB").classList.remove("selected");
    document.getElementById("btnC").classList.remove("selected");
    document.getElementById("btnD").classList.remove("selected");

    document.getElementById("btn"+pilih)
    .classList.add("selected");

    updateNavigasi();

}
    
function buatNavigasi(){

    const nav = document.getElementById("navSoal");

    for(let i=0;i<soal.length;i++){

        nav.innerHTML += `
            <button id="nav${i}"
            onclick="bukaSoal(${i})">
            ${i+1}
            </button>
        `;

    }

}

function bukaSoal(i){

    indexSoal = i;

    tampilSoal();

}

function updateNavigasi(){

    for(let i=0;i<jawabanPeserta.length;i++){

        if(jawabanPeserta[i]){

            document.getElementById("nav"+i)
            .classList.add("answered");

        }

    }

}

function updateNavigasiAktif(){

    for(let i=0;i<soal.length;i++){

        document.getElementById("nav"+i)
        .classList.remove("active");

    }

    document.getElementById("nav"+indexSoal)
    .classList.add("active");

}
    
function selesaiUjian(){

    skor = 0;

    for(let i=0;i<soal.length;i++){

        if(jawabanPeserta[i] === soal[i].jawaban){

            skor += 10;

        }

    }

    document.body.innerHTML = `
        <div style="
        padding:40px;
        text-align:center;
        font-family:Arial">

        <h1>UJIAN SELESAI</h1>

        <h2>Nilai Anda : ${skor}</h2>

        </div>
    `;

}

let waktu = 90 * 60;

function updateTimer(){

    let menit = Math.floor(waktu / 60);
    let detik = waktu % 60;

    menit = menit < 10 ? "0"+menit : menit;
    detik = detik < 10 ? "0"+detik : detik;

    document.getElementById("timer").innerHTML =
    menit + ":" + detik;

    if(waktu <= 0){

        selesaiUjian();

    }

    waktu--;

}

setInterval(updateTimer,1000);

loadSoal();

</script>

</body>
</html>
