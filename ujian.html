```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Expert Zealous CBT</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#eef2ff,#f8fafc);

}

/* HEADER */

.header{

    background:linear-gradient(135deg,#0f172a,#1e293b);

    padding:18px;

    border-radius:0 0 25px 25px;

    box-shadow:0 4px 15px rgba(0,0,0,0.25);

    position:sticky;
    top:0;
    z-index:999;

}

.header-content{

    display:flex;
    justify-content:space-between;
    align-items:center;

    gap:15px;

}

.brand{

    display:flex;
    align-items:center;

    gap:15px;

}

.logo{

    width:220px;
    object-fit:contain;

}

.brand-text{

    display:flex;
    flex-direction:column;

}

.brand-title{

    color:#ffd700;

    font-size:30px;

    font-weight:bold;

    font-style:italic;

    line-height:1.1;

}

.brand-sub{

    color:white;

    font-size:16px;

    margin-top:5px;

}

.timer{

    color:#ffd700;

    font-size:40px;

    font-weight:bold;

    font-style:italic;

}

/* CONTAINER */

.container{

    display:flex;
    flex-wrap:wrap;

    gap:18px;

    padding:18px;

}

/* SOAL */

.main{

    flex:3;
    min-width:300px;

}

.kotak-soal{

    background:white;

    padding:24px;

    border-radius:25px;

    box-shadow:0 4px 14px rgba(0,0,0,0.08);

}

#nomorSoal{

    font-size:42px;

    font-style:italic;

    color:#0f172a;

    margin-bottom:20px;

}

#teksSoal{

    font-size:28px;

    line-height:1.6;

    margin-bottom:20px;

}

#gambarSoal{

    width:100%;

    border-radius:18px;

    margin-bottom:20px;

}

/* PILIHAN */

#pilihanJawaban{

    margin-top:15px;

}

.pilihan{

    background:#2196f3;

    color:white;

    padding:18px;

    border-radius:18px;

    margin-top:15px;

    font-size:22px;

    font-weight:bold;

    font-style:italic;

    cursor:pointer;

    transition:0.3s;

}

.pilihan:hover{

    transform:scale(1.02);

}

.pilihan.selected{

    background:linear-gradient(135deg,#16a34a,#22c55e);

}

/* SIDEBAR */

.sidebar{

    flex:1;
    min-width:260px;

}

.kotak-sidebar{

    background:white;

    padding:24px;

    border-radius:25px;

    box-shadow:0 4px 14px rgba(0,0,0,0.08);

    position:sticky;
    top:120px;

}

.info{

    margin-bottom:22px;

    line-height:1.8;

}

.info h2{

    color:#0f172a;

    margin-bottom:10px;

}

.nav-title{

    font-size:26px;

    font-weight:bold;

    font-style:italic;

    margin-bottom:15px;

    color:#0f172a;

}

.nav-soal{

    display:grid;

    grid-template-columns:repeat(5,1fr);

    gap:10px;

}

.nav-btn{

    border:none;

    border-radius:14px;

    padding:12px;

    background:#cbd5e1;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

}

.nav-btn:hover{

    transform:scale(1.08);

}

.nav-btn.active{

    background:gold;

    color:black;

}

.nav-btn.answered{

    background:#22c55e;

    color:white;

}

/* TOMBOL */

#selesaiBtn{

    width:100%;

    margin-top:24px;

    padding:16px;

    border:none;

    border-radius:18px;

    background:linear-gradient(135deg,#dc2626,#ef4444);

    color:white;

    font-size:20px;

    font-weight:bold;

    cursor:pointer;

}

/* RESPONSIVE */

@media(max-width:768px){

    .header-content{

        flex-direction:column;

        text-align:center;

    }

    .brand{

        flex-direction:column;

    }

    .logo{

        width:250px;

    }

    .brand-title{

        font-size:24px;

    }

    .timer{

        font-size:34px;

    }

    .container{

        flex-direction:column;

    }

    .kotak-sidebar{

        position:static;

    }

    #nomorSoal{

        font-size:30px;

    }

    #teksSoal{

        font-size:22px;

    }

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

    <div class="header-content">

        <div class="brand">

            <img class="logo"
            src="https://drive.google.com/thumbnail?sz=w1000&id=1r6OAqG_IeaIbkVEbi-DMJVYEy5s0-mRW">

            <div class="brand-text">

                <div class="brand-title">
                    Jagonya Matematika
                </div>

                <div class="brand-sub">
                    Les Private Matematika
                </div>

            </div>

        </div>

        <div class="timer" id="timer">
            90:00
        </div>

    </div>

</div>

<!-- CONTAINER -->

<div class="container">

    <!-- SOAL -->

    <div class="main">

        <div class="kotak-soal">

            <div id="nomorSoal">
                Soal Nomor 1
            </div>

            <div id="teksSoal"></div>

            <img id="gambarSoal">

            <div id="pilihanJawaban"></div>

        </div>

    </div>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="kotak-sidebar">

            <div class="info">

                <h2>Peserta</h2>

                <div id="peserta"></div>

            </div>

            <div class="nav-title">
                Navigasi Soal
            </div>

            <div class="nav-soal" id="navSoal"></div>

            <button id="selesaiBtn" onclick="selesaiUjian()">
                Selesai Ujian
            </button>

        </div>

    </div>

</div>

<script>

const csvSoal =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQBwCh8bWn1_YXtW4ITfOz6qSRI_x5wTO8_JIuL9v5ibeiEdPQP0vEwG_dPJnM1UutBVZjRaDI8DSVN/pub?gid=0&single=true&output=csv";

let soal = [];
let indexSoal = 0;
let jawabanPeserta = [];

const nama = localStorage.getItem("namaPeserta");
const nomor = localStorage.getItem("nomorPeserta");

document.getElementById("peserta").innerHTML =
"<b>"+nama+"</b><br>("+nomor+")";

async function loadSoal(){

    const response = await fetch(csvSoal);

    const data = await response.text();

    const rows = data.split("\n").slice(1);

    soal = rows.map(row=>{

        const col = row.split(",");

        return{

            teks:col[0],
            gambar:col[1],
            a:col[2],
            b:col[3],
            c:col[4],
            d:col[5]

        };

    });

    buatNavigasi();

    tampilSoal();

}

function tampilSoal(){

    const s = soal[indexSoal];

    document.getElementById("nomorSoal").innerHTML =
    "Soal Nomor "+(indexSoal+1);

    document.getElementById("teksSoal").innerHTML =
    s.teks;

    document.getElementById("gambarSoal").src =
    s.gambar;

    const pilihan = document.getElementById("pilihanJawaban");

    pilihan.innerHTML = "";

    const jawaban = [s.a,s.b,s.c,s.d];

    jawaban.forEach((j,index)=>{

        const div = document.createElement("div");

        div.className = "pilihan";

        if(jawabanPeserta[indexSoal]===index){

            div.classList.add("selected");

        }

        div.innerHTML = j;

        div.onclick = ()=>{

            jawabanPeserta[indexSoal]=index;

            tampilSoal();

            updateNavigasi();

        };

        pilihan.appendChild(div);

    });

    updateNavigasiAktif();

}

function buatNavigasi(){

    const nav = document.getElementById("navSoal");

    for(let i=0;i<soal.length;i++){

        const btn = document.createElement("button");

        btn.innerHTML = i+1;

        btn.id = "nav"+i;

        btn.className = "nav-btn";

        btn.onclick = ()=>{

            indexSoal = i;

            tampilSoal();

        };

        nav.appendChild(btn);

    }

}

function updateNavigasi(){

    for(let i=0;i<jawabanPeserta.length;i++){

        if(jawabanPeserta[i]!=null){

            document.getElementById("nav"+i)
            .classList.add("answered");

        }

    }

}

function updateNavigasiAktif(){

    for(let i=0;i<soal.length;i++){

        document.getElementById("nav"+i)
        .classList.remove("active");

    }

    document.getElementById("nav"+indexSoal)
    .classList.add("active");

}

function selesaiUjian(){

    alert("Terima kasih telah mengerjakan ujian 😊");

}

let waktu = 90*60;

function updateTimer(){

    const menit = Math.floor(waktu/60);

    const detik = waktu%60;

    document.getElementById("timer").innerHTML =
    menit+":"+(detik<10?"0":"")+detik;

    if(waktu>0){

        waktu--;

    }

}

setInterval(updateTimer,1000);

loadSoal();

</script>

</body>
</html>
```
